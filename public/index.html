<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>6nr 加密聊天</title>
  <style>
    :root {
      --primary: #5b6cff;
      --accent: #00a884;
      --danger: #d64545;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-soft: #eef1f7;
      --text: #202434;
      --muted: #687085;
      --line: #dfe4ee;
      --shadow: 0 14px 34px rgba(22, 27, 45, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    .hidden { display: none !important; }
    .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    .sidebar {
      background: #151927;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .brand { padding: 22px 20px; font-size: 28px; font-weight: 800; letter-spacing: .3px; }
    .nav { display: grid; gap: 6px; padding: 8px 12px; }
    .nav button {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      background: transparent;
      color: #bfc6d9;
      text-align: left;
    }
    .nav button.active, .nav button:hover { background: rgba(255,255,255,.1); color: #fff; }
    .me {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--primary);
      font-weight: 800;
      background-size: cover;
      background-position: center;
      flex: 0 0 auto;
    }
    .main { min-width: 0; height: 100vh; overflow: hidden; }
    .page { display: none; height: 100%; min-width: 0; }
    .page.active { display: flex; flex-direction: column; }
    .header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      flex: 0 0 auto;
    }
    .header h1 { margin: 0; font-size: 18px; }
    .content { overflow: auto; padding: 18px; flex: 1; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .auth {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #f5f8ff, #eef8f4);
    }
    .auth-card { width: min(420px, 100%); padding: 28px; }
    .auth-card h1 { margin: 0 0 6px; font-size: 30px; }
    .auth-card p { margin: 0 0 22px; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 11px 12px;
      outline: none;
    }
    textarea { resize: vertical; min-height: 84px; }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,108,255,.12); }
    .field { margin-bottom: 12px; }
    .primary { background: var(--primary); color: #fff; border-radius: 8px; padding: 10px 14px; font-weight: 700; }
    .secondary { background: var(--panel-soft); color: var(--text); border-radius: 8px; padding: 10px 14px; }
    .danger { background: #ffe8e8; color: var(--danger); border-radius: 8px; padding: 10px 14px; }
    .link-btn { background: transparent; color: var(--primary); padding: 0; }
    .split { display: grid; grid-template-columns: 330px 1fr; min-height: 0; flex: 1; }
    .list-panel { border-right: 1px solid var(--line); background: var(--panel); min-width: 0; display: flex; flex-direction: column; }
    .list { overflow: auto; flex: 1; padding: 8px; }
    .row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      min-width: 0;
    }
    .row:hover, .row.active { background: var(--panel-soft); }
    .row-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-sub { color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      min-width: 22px;
      height: 22px;
      border-radius: 11px;
      display: inline-grid;
      place-items: center;
      background: var(--danger);
      color: #fff;
      font-size: 12px;
      padding: 0 7px;
    }
    .chat { display: flex; flex-direction: column; min-width: 0; background: #f9fafc; }
    .messages { flex: 1; overflow: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
    .bubble {
      max-width: min(680px, 78%);
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 4px 12px rgba(22,27,45,.05);
    }
    .sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .received { align-self: flex-start; background: #fff; border: 1px solid var(--line); border-bottom-left-radius: 4px; }
    .meta { margin-top: 5px; opacity: .7; font-size: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    .composer { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px; background: var(--panel); border-top: 1px solid var(--line); }
    .stack { display: grid; gap: 14px; max-width: 860px; }
    .moment { padding: 16px; display: grid; gap: 10px; }
    .moment-head { display: flex; align-items: center; gap: 10px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .comment { padding: 8px 10px; background: var(--panel-soft); border-radius: 8px; margin-top: 6px; }
    .friend-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .settings-grid { display: grid; gap: 16px; max-width: 720px; }
    .setting { padding: 16px; display: grid; gap: 10px; }
    .avatar-tools { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #151927;
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 50;
      max-width: min(92vw, 560px);
      text-align: center;
    }
    .toast.show { opacity: 1; }
    .mobile-nav { display: none; }

    @media (max-width: 760px) {
      body { overflow: hidden; }
      .app { grid-template-columns: 1fr; padding-bottom: 62px; }
      .sidebar { display: none; }
      .mobile-nav {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: calc(62px + env(safe-area-inset-bottom, 0px));
        padding-bottom: env(safe-area-inset-bottom, 0px);
        background: #fff;
        border-top: 1px solid var(--line);
        z-index: 20;
      }
      .mobile-nav button { background: transparent; color: var(--muted); }
      .mobile-nav button.active { color: var(--primary); font-weight: 800; }
      .split { grid-template-columns: 1fr; }
      .chat {
        position: fixed;
        inset: 0 0 calc(62px + env(safe-area-inset-bottom, 0px)) 0;
        z-index: 18;
        display: none;
      }
      .chat.open { display: flex; }
      .list-panel { border-right: 0; }
      .bubble { max-width: 86%; }
      .header { padding: 0 14px; }
      .content { padding: 12px; }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <section id="auth" class="auth">
    <div class="auth-card card">
      <h1 id="auth-title">登录 6nr</h1>
      <p>端到端加密聊天，服务器只保存密文。</p>
      <div class="field"><input id="auth-username" autocomplete="username" placeholder="用户名"></div>
      <div class="field"><input id="auth-password" type="password" autocomplete="current-password" placeholder="密码"></div>
      <div class="field hidden" id="confirm-wrap"><input id="auth-confirm" type="password" autocomplete="new-password" placeholder="确认密码"></div>
      <button id="auth-submit" class="primary" type="button">登录</button>
      <p style="margin-top:16px"><span id="auth-switch-text">还没有账号？</span> <button class="link-btn" type="button" onclick="toggleAuthMode()">注册</button></p>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">6nr</div>
      <nav class="nav">
        <button data-page="messages" class="active" type="button" onclick="switchPage('messages')">消息</button>
        <button data-page="square" type="button" onclick="switchPage('square')">广场</button>
        <button data-page="friends" type="button" onclick="switchPage('friends')">好友</button>
        <button data-page="settings" type="button" onclick="switchPage('settings')">设置</button>
      </nav>
      <div class="me">
        <div id="me-avatar" class="avatar">6</div>
        <div>
          <div id="me-name" class="row-title">6nr</div>
          <div class="row-sub">已加密连接</div>
        </div>
        <button class="secondary" type="button" onclick="logout()">退出</button>
      </div>
    </aside>

    <main class="main">
      <section id="page-messages" class="page active">
        <div class="split">
          <div class="list-panel">
            <div class="header"><h1>消息</h1><button class="secondary" type="button" onclick="loadChatList()">刷新</button></div>
            <div id="chat-list" class="list"></div>
          </div>
          <div id="chat" class="chat">
            <div class="header">
              <h1 id="chat-title">选择一个好友</h1>
              <button class="secondary hidden" id="back-chat" type="button" onclick="closeChat()">返回</button>
            </div>
            <div id="messages" class="messages"><div class="row-sub">选择一个好友开始聊天。</div></div>
            <div class="composer">
              <input id="message-input" placeholder="输入消息，回车发送" onkeydown="if(event.key==='Enter')sendMessage()">
              <button class="primary" type="button" onclick="sendMessage()">发送</button>
            </div>
          </div>
        </div>
      </section>

      <section id="page-square" class="page">
        <div class="header"><h1>广场</h1><button class="secondary" type="button" onclick="loadSquare()">刷新</button></div>
        <div class="content">
          <div class="stack">
            <div class="card moment">
              <textarea id="moment-input" placeholder="分享一条动态"></textarea>
              <select id="moment-blocked" multiple title="选择不可见好友"></select>
              <div class="actions"><button class="primary" type="button" onclick="postMoment()">发布</button></div>
            </div>
            <div id="square-list" class="stack"></div>
          </div>
        </div>
      </section>

      <section id="page-friends" class="page">
        <div class="header"><h1>好友</h1><button class="secondary" type="button" onclick="loadFriends()">刷新</button></div>
        <div class="content">
          <div class="stack">
            <div class="card setting">
              <div class="actions">
                <input id="search-input" placeholder="搜索用户名或昵称">
                <button class="primary" type="button" onclick="searchUsers()">搜索</button>
              </div>
              <div id="search-results"></div>
            </div>
            <div class="card setting">
              <h3>好友请求</h3>
              <div id="request-list"></div>
            </div>
            <div class="card setting">
              <h3>好友列表</h3>
              <div id="friend-list"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="page-settings" class="page">
        <div class="header"><h1>设置</h1></div>
        <div class="content">
          <div class="settings-grid">
            <div class="card setting">
              <h3>资料</h3>
              <input id="nickname-input" placeholder="昵称">
              <textarea id="bio-input" maxlength="160" placeholder="简介"></textarea>
              <div class="avatar-tools">
                <div id="avatar-preview" class="avatar">6</div>
                <input id="avatar-file" type="file" accept="image/*" onchange="previewAvatar(event)">
              </div>
              <div class="actions">
                <button class="primary" type="button" onclick="saveProfile()">保存资料</button>
                <button class="secondary" type="button" onclick="clearAvatar()">清除头像</button>
              </div>
            </div>
            <div class="card setting">
              <h3>密码</h3>
              <input id="old-password" type="password" placeholder="旧密码">
              <input id="new-password" type="password" placeholder="新密码">
              <button class="primary" type="button" onclick="changePassword()">修改密码</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <nav class="mobile-nav">
      <button data-page="messages" class="active" type="button" onclick="switchPage('messages')">消息</button>
      <button data-page="square" type="button" onclick="switchPage('square')">广场</button>
      <button data-page="friends" type="button" onclick="switchPage('friends')">好友</button>
      <button data-page="settings" type="button" onclick="switchPage('settings')">设置</button>
    </nav>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    const API_BASE = '/api';
    const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;

    let isLogin = true;
    let token = localStorage.getItem('securechat_token') || '';
    let currentUser = JSON.parse(localStorage.getItem('securechat_user') || 'null');
    let profile = {};
    let keyPair = null;
    let ws = null;
    let friends = [];
    let chats = [];
    let square = [];
    let activeFriend = null;
    let draftAvatar = '';

    function toast(message) {
      $('toast').textContent = message;
      $('toast').classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2600);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function initials(user) {
      const name = user?.nickname || user?.username || user || '?';
      return String(name).slice(0, 1).toUpperCase();
    }

    function colorFor(value) {
      const colors = ['#5b6cff', '#00a884', '#b85cff', '#c27a11', '#ce3f6a', '#2574a9', '#6c7a12'];
      let n = 0;
      for (const ch of String(value || '6nr')) n = (n + ch.charCodeAt(0)) % colors.length;
      return colors[n];
    }

    function avatarStyle(user) {
      return user?.avatar ? `background-image:url(${escapeHtml(user.avatar)});background-color:transparent` : `background:${colorFor(user?.nickname || user?.username)}`;
    }

    function timeText(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      const diff = Date.now() - d.getTime();
      if (diff < 60_000) return '刚刚';
      if (diff < 3_600_000) return `${Math.floor(diff / 60_000)} 分钟前`;
      if (diff < 86_400_000) return `${Math.floor(diff / 3_600_000)} 小时前`;
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(API_BASE + path, { ...options, headers });
      const text = await response.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || '请求失败' }; }
      if (!response.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    const CryptoHelper = {
      async generateKeyPair() {
        return crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveKey', 'deriveBits']);
      },
      async exportPublicKey(key) {
        const jwk = await crypto.subtle.exportKey('jwk', key);
        return { kty: jwk.kty, crv: jwk.crv, x: jwk.x, y: jwk.y };
      },
      async importPrivateKey(jwk) {
        return crypto.subtle.importKey('jwk', jwk, { name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveKey', 'deriveBits']);
      },
      async importPublicKey(jwk) {
        return crypto.subtle.importKey('jwk', { kty: jwk.kty, crv: jwk.crv, x: jwk.x, y: jwk.y }, { name: 'ECDH', namedCurve: 'P-256' }, true, []);
      },
      async deriveSharedKey(privateKey, publicJwk) {
        const publicKey = await this.importPublicKey(publicJwk);
        return crypto.subtle.deriveKey({ name: 'ECDH', public: publicKey }, privateKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
      },
      async encrypt(plain, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plain)));
        const all = new Uint8Array(iv.length + encrypted.length);
        all.set(iv, 0);
        all.set(encrypted, iv.length);
        return btoa(String.fromCharCode(...all));
      },
      async decrypt(cipher, key) {
        try {
          const data = Uint8Array.from(atob(cipher), (c) => c.charCodeAt(0));
          const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: data.slice(0, 12) }, key, data.slice(12));
          return new TextDecoder().decode(plain);
        } catch {
          return '[解密失败]';
        }
      }
    };

    async function getOrCreateKeyPair(userId) {
      const storageKey = `ecdh_private_jwk_${userId}`;
      const stored = localStorage.getItem(storageKey);
      if (stored) {
        try {
          const privateKey = await CryptoHelper.importPrivateKey(JSON.parse(stored));
          return { privateKey, publicKey: await CryptoHelper.exportPublicKey(privateKey) };
        } catch {
          localStorage.removeItem(storageKey);
        }
      }
      const pair = await CryptoHelper.generateKeyPair();
      localStorage.setItem(storageKey, JSON.stringify(await crypto.subtle.exportKey('jwk', pair.privateKey)));
      return { privateKey: pair.privateKey, publicKey: await CryptoHelper.exportPublicKey(pair.publicKey) };
    }

    async function sharedKey(friendId) {
      const data = await api(`/user/${friendId}/public-key`);
      return CryptoHelper.deriveSharedKey(keyPair.privateKey, data.public_key);
    }

    function toggleAuthMode() {
      isLogin = !isLogin;
      $('auth-title').textContent = isLogin ? '登录 6nr' : '注册 6nr';
      $('auth-submit').textContent = isLogin ? '登录' : '注册';
      $('confirm-wrap').classList.toggle('hidden', isLogin);
      $('auth-switch-text').textContent = isLogin ? '还没有账号？' : '已有账号？';
      document.querySelector('.link-btn').textContent = isLogin ? '注册' : '登录';
    }

    async function handleAuth() {
      const username = $('auth-username').value.trim();
      const password = $('auth-password').value;
      const confirm = $('auth-confirm').value;
      if (!username || !password) return toast('请填写用户名和密码');
      if (!isLogin && password !== confirm) return toast('两次密码不一致');
      if (password.length < 4) return toast('密码至少 4 位');
      try {
        let data;
        if (isLogin) {
          data = await api('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
          currentUser = data.user;
          keyPair = await getOrCreateKeyPair(currentUser.id);
          await api('/user/public-key', { method: 'PUT', body: JSON.stringify({ public_key: keyPair.publicKey }) });
        } else {
          const tempId = `temp_${Date.now()}`;
          keyPair = await getOrCreateKeyPair(tempId);
          data = await api('/register', { method: 'POST', body: JSON.stringify({ username, password, public_key: keyPair.publicKey }) });
          currentUser = data.user;
          localStorage.setItem(`ecdh_private_jwk_${currentUser.id}`, localStorage.getItem(`ecdh_private_jwk_${tempId}`));
          localStorage.removeItem(`ecdh_private_jwk_${tempId}`);
        }
        token = data.token;
        profile = data.user;
        localStorage.setItem('securechat_token', token);
        localStorage.setItem('securechat_user', JSON.stringify(currentUser));
        await enterApp();
      } catch (error) {
        toast(error.message);
      }
    }

    function logout() {
      if (ws) ws.close();
      token = '';
      currentUser = null;
      profile = {};
      activeFriend = null;
      localStorage.removeItem('securechat_token');
      localStorage.removeItem('securechat_user');
      $('auth').classList.remove('hidden');
      $('app').classList.add('hidden');
    }

    async function enterApp() {
      $('auth').classList.add('hidden');
      $('app').classList.remove('hidden');
      if (!keyPair) keyPair = await getOrCreateKeyPair(currentUser.id);
      try {
        const data = await api('/user/profile');
        profile = data.user;
      } catch {
        profile = currentUser;
      }
      renderMe();
      connectWebSocket();
      await loadAll();
      switchPage('messages');
    }

    function renderMe() {
      $('me-name').textContent = profile.nickname || currentUser.username;
      $('me-avatar').textContent = profile.avatar ? '' : initials(profile);
      $('me-avatar').style.cssText = avatarStyle(profile);
    }

    function connectWebSocket() {
      if (!token) return;
      if (ws) ws.close();
      ws = new WebSocket(`${WS_URL}?token=${encodeURIComponent(token)}`);
      ws.onmessage = async (event) => {
        const message = JSON.parse(event.data);
        if (message.type === 'new_message') {
          const friendId = message.message.from_id === currentUser.id ? message.message.to_id : message.message.from_id;
          if (activeFriend && activeFriend.id === friendId) {
            const key = await sharedKey(friendId);
            const text = await CryptoHelper.decrypt(message.message.content, key);
            appendMessage({ ...message.message, decrypted_content: text });
            await markRead(friendId);
          }
          loadChatList();
        }
        if (['new_moment', 'friends_changed', 'friend_request'].includes(message.type)) loadAll();
        if (message.type === 'read_receipt' && activeFriend && activeFriend.id === message.by) loadMessages(activeFriend.id);
      };
      ws.onclose = () => {
        if (token) setTimeout(connectWebSocket, 3000);
      };
    }

    function switchPage(page) {
      document.querySelectorAll('.page').forEach((el) => el.classList.remove('active'));
      $(`page-${page}`).classList.add('active');
      document.querySelectorAll('[data-page]').forEach((el) => el.classList.toggle('active', el.dataset.page === page));
      if (page !== 'messages') closeChat(false);
      if (page === 'messages') loadChatList();
      if (page === 'square') loadSquare();
      if (page === 'friends') loadFriends();
      if (page === 'settings') loadSettings();
    }

    async function loadAll() {
      await Promise.all([loadFriends(), loadChatList(), loadSquare()]);
    }

    async function loadChatList() {
      if (!token) return;
      try {
        const data = await api('/chat-list');
        chats = data.chats || [];
        renderChatList();
      } catch {}
    }

    function renderChatList() {
      const list = $('chat-list');
      if (!chats.length) {
        list.innerHTML = '<div class="row-sub" style="padding:18px">暂无会话。先添加好友并发送消息。</div>';
        return;
      }
      list.innerHTML = chats.map((chat) => {
        const user = { username: chat.friend_name, nickname: chat.friend_nickname, avatar: chat.friend_avatar };
        const active = activeFriend?.id === chat.friend_id ? 'active' : '';
        const unread = chat.unread_count ? `<span class="badge">${chat.unread_count}</span>` : '';
        return `<div class="row ${active}" onclick="openChat(${chat.friend_id}, '${escapeHtml(chat.friend_nickname || chat.friend_name)}')">
          <div class="avatar" style="${avatarStyle(user)}">${user.avatar ? '' : initials(user)}</div>
          <div>
            <div class="row-title">${escapeHtml(chat.friend_nickname || chat.friend_name)}</div>
            <div class="row-sub">${chat.last_time ? '加密消息' : '还没有消息'}</div>
          </div>
          <div>${unread}<div class="row-sub">${timeText(chat.last_time)}</div></div>
        </div>`;
      }).join('');
    }

    async function openChat(id, name) {
      activeFriend = { id, name };
      $('chat').classList.add('open');
      $('back-chat').classList.remove('hidden');
      $('chat-title').textContent = name;
      renderChatList();
      await loadMessages(id);
      await markRead(id);
    }

    function closeChat(clear = true) {
      $('chat').classList.remove('open');
      $('back-chat').classList.add('hidden');
      if (clear) activeFriend = null;
      renderChatList();
    }

    async function loadMessages(friendId) {
      try {
        const data = await api(`/messages/${friendId}`);
        const key = await sharedKey(friendId);
        $('messages').innerHTML = '';
        for (const msg of data.messages || []) {
          const text = await CryptoHelper.decrypt(msg.content, key);
          appendMessage({ ...msg, decrypted_content: text });
        }
        if (!(data.messages || []).length) $('messages').innerHTML = '<div class="row-sub">还没有消息。</div>';
        scrollMessages();
      } catch (error) {
        toast(error.message);
      }
    }

    function appendMessage(msg) {
      const mine = msg.from_id === currentUser.id;
      const div = document.createElement('div');
      div.className = `bubble ${mine ? 'sent' : 'received'}`;
      div.innerHTML = `${escapeHtml(msg.decrypted_content || msg.content)}<div class="meta"><span>${timeText(msg.created_at)}</span>${mine ? `<span>${msg.read_at ? '已读' : '已送达'}</span>` : ''}</div>`;
      $('messages').appendChild(div);
      scrollMessages();
    }

    function scrollMessages() {
      const box = $('messages');
      setTimeout(() => { box.scrollTop = box.scrollHeight; }, 20);
    }

    async function sendMessage() {
      if (!activeFriend) return toast('请先选择好友');
      const input = $('message-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      try {
        const key = await sharedKey(activeFriend.id);
        const encrypted = await CryptoHelper.encrypt(text, key);
        const data = await api('/messages', { method: 'POST', body: JSON.stringify({ to_id: activeFriend.id, content: encrypted }) });
        appendMessage({ ...data.message, decrypted_content: text });
        loadChatList();
      } catch (error) {
        toast(error.message);
      }
    }

    async function markRead(friendId) {
      try {
        await api(`/mark-read/${friendId}`, { method: 'POST' });
        loadChatList();
      } catch {}
    }

    async function loadFriends() {
      if (!token) return;
      try {
        const data = await api('/friends');
        friends = data.friends || [];
        renderFriends(data.requests || []);
        renderMomentBlockedOptions();
      } catch {}
    }

    function renderFriends(requests) {
      $('request-list').innerHTML = requests.length ? requests.map((request) => {
        const user = { username: request.username, nickname: request.nickname, avatar: request.avatar };
        return `<div class="row">
          <div class="avatar" style="${avatarStyle(user)}">${user.avatar ? '' : initials(user)}</div>
          <div class="row-title">${escapeHtml(user.nickname || user.username)}</div>
          <div class="friend-actions">
            <button class="primary" onclick="handleRequest(${request.from_id}, 'accept')">接受</button>
            <button class="secondary" onclick="handleRequest(${request.from_id}, 'reject')">拒绝</button>
          </div>
        </div>`;
      }).join('') : '<div class="row-sub">暂无好友请求。</div>';

      $('friend-list').innerHTML = friends.length ? friends.map((friend) => {
        return `<div class="row">
          <div class="avatar" style="${avatarStyle(friend)}">${friend.avatar ? '' : initials(friend)}</div>
          <div>
            <div class="row-title">${escapeHtml(friend.nickname || friend.username)}</div>
            <div class="row-sub">${escapeHtml(friend.bio || '')}</div>
          </div>
          <div class="friend-actions">
            <button class="primary" onclick="openChat(${friend.id}, '${escapeHtml(friend.nickname || friend.username)}');switchPage('messages')">聊天</button>
            <button class="secondary" onclick="toggleBlock(${friend.id}, ${Number(friend.is_blocked)})">${Number(friend.is_blocked) ? '取消屏蔽' : '屏蔽'}</button>
            <button class="danger" onclick="deleteFriend(${friend.id})">删除</button>
          </div>
        </div>`;
      }).join('') : '<div class="row-sub">暂无好友。</div>';
    }

    function renderMomentBlockedOptions() {
      $('moment-blocked').innerHTML = friends.map((friend) => `<option value="${friend.id}">${escapeHtml(friend.nickname || friend.username)}</option>`).join('');
    }

    async function searchUsers() {
      const q = $('search-input').value.trim();
      if (!q) return toast('请输入搜索内容');
      try {
        const data = await api(`/search-users?q=${encodeURIComponent(q)}`);
        $('search-results').innerHTML = (data.users || []).length ? data.users.map((user) => `<div class="row">
          <div class="avatar" style="${avatarStyle(user)}">${user.avatar ? '' : initials(user)}</div>
          <div><div class="row-title">${escapeHtml(user.nickname || user.username)}</div><div class="row-sub">${escapeHtml(user.username)}</div></div>
          <button class="primary" onclick="sendFriendRequest(${user.id})">添加</button>
        </div>`).join('') : '<div class="row-sub">没有找到用户。</div>';
      } catch (error) {
        toast(error.message);
      }
    }

    async function sendFriendRequest(id) {
      try {
        await api('/friend-request', { method: 'POST', body: JSON.stringify({ to_id: id }) });
        toast('好友请求已发送');
        $('search-results').innerHTML = '';
      } catch (error) {
        toast(error.message);
      }
    }

    async function handleRequest(fromId, action) {
      try {
        await api(`/friend-request/${fromId}`, { method: 'POST', body: JSON.stringify({ action }) });
        toast(action === 'accept' ? '已添加好友' : '已拒绝');
        loadAll();
      } catch (error) {
        toast(error.message);
      }
    }

    async function toggleBlock(id, isBlocked) {
      try {
        await api(`/block/${id}`, { method: isBlocked ? 'DELETE' : 'POST' });
        toast(isBlocked ? '已取消屏蔽' : '已屏蔽');
        loadAll();
      } catch (error) {
        toast(error.message);
      }
    }

    async function deleteFriend(id) {
      if (!confirm('确定删除这个好友吗？双方好友关系都会解除。')) return;
      try {
        await api(`/friends/${id}`, { method: 'DELETE' });
        toast('已删除好友');
        if (activeFriend?.id === id) closeChat();
        loadAll();
      } catch (error) {
        toast(error.message);
      }
    }

    async function loadSquare() {
      if (!token) return;
      try {
        const data = await api('/moments');
        square = data.moments || [];
        renderSquare();
      } catch {}
    }

    function renderSquare() {
      $('square-list').innerHTML = square.length ? square.map((moment) => {
        const liked = moment.likes && moment.likes.includes(currentUser.id);
        return `<div class="card moment">
          <div class="moment-head">
            <div class="avatar" style="${avatarStyle(moment)}">${moment.avatar ? '' : initials(moment)}</div>
            <div><div class="row-title">${escapeHtml(moment.nickname || moment.username)}</div><div class="row-sub">${timeText(moment.created_at)}</div></div>
          </div>
          <div>${escapeHtml(moment.content)}</div>
          <div class="actions">
            <button class="secondary" onclick="toggleLike(${moment.id})">${liked ? '取消赞' : '点赞'} ${moment.like_count || 0}</button>
            <span class="row-sub">${(moment.comments || []).length} 条评论</span>
          </div>
          <div>${(moment.comments || []).map((comment) => `<div class="comment"><b>${escapeHtml(comment.nickname || comment.username)}:</b> ${escapeHtml(comment.content)}</div>`).join('')}</div>
          <div class="actions"><input id="comment-${moment.id}" placeholder="写评论"><button class="primary" onclick="addComment(${moment.id})">评论</button></div>
        </div>`;
      }).join('') : '<div class="row-sub">暂无动态。</div>';
    }

    async function postMoment() {
      const content = $('moment-input').value.trim();
      const blocked = Array.from($('moment-blocked').selectedOptions).map((option) => Number(option.value));
      if (!content) return toast('请输入动态内容');
      try {
        await api('/moments', { method: 'POST', body: JSON.stringify({ content, blocked }) });
        $('moment-input').value = '';
        $('moment-blocked').selectedIndex = -1;
        toast('已发布');
        loadSquare();
      } catch (error) {
        toast(error.message);
      }
    }

    async function toggleLike(id) {
      try {
        await api(`/moments/${id}/like`, { method: 'POST' });
        loadSquare();
      } catch (error) {
        toast(error.message);
      }
    }

    async function addComment(id) {
      const input = $(`comment-${id}`);
      const content = input.value.trim();
      if (!content) return;
      try {
        await api(`/moments/${id}/comment`, { method: 'POST', body: JSON.stringify({ content }) });
        input.value = '';
        loadSquare();
      } catch (error) {
        toast(error.message);
      }
    }

    function loadSettings() {
      $('nickname-input').value = profile.nickname || currentUser.username;
      $('bio-input').value = profile.bio || '';
      draftAvatar = profile.avatar || '';
      updateAvatarPreview();
    }

    function updateAvatarPreview() {
      $('avatar-preview').textContent = draftAvatar ? '' : initials(profile);
      $('avatar-preview').style.cssText = draftAvatar ? `background-image:url(${draftAvatar});background-color:transparent` : `background:${colorFor(profile.nickname || currentUser.username)}`;
    }

    function previewAvatar(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      if (file.size > 2.5 * 1024 * 1024) return toast('头像不能超过 2.5MB');
      const reader = new FileReader();
      reader.onload = () => {
        draftAvatar = reader.result;
        updateAvatarPreview();
      };
      reader.readAsDataURL(file);
    }

    function clearAvatar() {
      draftAvatar = '';
      updateAvatarPreview();
    }

    async function saveProfile() {
      const nickname = $('nickname-input').value.trim();
      const bio = $('bio-input').value.trim();
      if (!nickname) return toast('昵称不能为空');
      try {
        await api('/user/profile', { method: 'PUT', body: JSON.stringify({ nickname, bio, avatar: draftAvatar }) });
        const data = await api('/user/profile');
        profile = data.user;
        renderMe();
        toast('资料已保存');
      } catch (error) {
        toast(error.message);
      }
    }

    async function changePassword() {
      const oldPassword = $('old-password').value;
      const newPassword = $('new-password').value;
      if (!oldPassword || !newPassword) return toast('请填写旧密码和新密码');
      try {
        await api('/user/password', { method: 'PUT', body: JSON.stringify({ oldPassword, newPassword }) });
        $('old-password').value = '';
        $('new-password').value = '';
        toast('密码已修改');
      } catch (error) {
        toast(error.message);
      }
    }

    $('auth-submit').addEventListener('click', handleAuth);
    for (const id of ['auth-username', 'auth-password', 'auth-confirm']) {
      $(id).addEventListener('keydown', (event) => {
        if (event.key === 'Enter') handleAuth();
      });
    }

    window.addEventListener('load', async () => {
      if (token && currentUser) {
        try {
          await enterApp();
        } catch {
          logout();
        }
      }
    });
  </script>
</body>
</html>
