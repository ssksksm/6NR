<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat - 端到端加密聊天</title>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-dark: #3b54d4;
            --bg: #f0f2f5;
            --white: #fff;
            --text: #1a1a2e;
            --text-secondary: #65676b;
            --border: #e0e0e0;
            --hover: #f5f6f8;
            --danger: #e74c3c;
            --success: #2ecc71;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --sidebar-width: 320px;
            --header-height: 60px;
            --nav-mobile-height: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            -webkit-font-smoothing: antialiased; user-select: none; -webkit-user-select: none;
        }
        #app { display: flex; height: 100vh; width: 100%; }
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width); background: var(--white);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;
            transition: var(--transition);
        }
        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; height: var(--header-height);
        }
        .sidebar-header .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .sidebar-nav { display: flex; flex-direction: column; padding: 8px; gap: 2px; }
        .sidebar-nav .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition); font-weight: 500; color: var(--text);
            font-size: 0.95rem; border: none; background: none; width: 100%; text-align: left;
        }
        .sidebar-nav .nav-item:hover { background: var(--hover); }
        .sidebar-nav .nav-item.active { background: #eef1ff; color: var(--primary); font-weight: 600; }
        .sidebar-footer {
            margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: var(--transition);
            border-radius: var(--radius-sm); margin: 8px;
        }
        .sidebar-footer:hover { background: var(--hover); }
        .sidebar-footer .avatar {
            width: 38px; height: 38px; border-radius: 50%; background: var(--primary);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; flex-shrink: 0;
        }
        .sidebar-footer .user-info { flex: 1; min-width: 0; }
        .sidebar-footer .user-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-footer .user-status { font-size: 0.75rem; color: var(--text-secondary); }
        .logout-btn { background: none; border: none; color: #999; cursor: pointer; padding: 6px; border-radius: 50%; }
        .logout-btn:hover { color: var(--danger); background: #fef2f2; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .page { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .page.active { display: flex; }
        .chat-list-page { display: flex; height: 100%; }
        .chat-list-panel { width: 340px; min-width: 340px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-list-panel .panel-header { padding: 16px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid var(--border); height: var(--header-height); display: flex; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid #f5f5f5; }
        .chat-list-item:hover { background: var(--hover); }
        .chat-list-item.active { background: #eef1ff; border-left: 3px solid var(--primary); }
        .chat-list-item .chat-avatar { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 1.1rem; }
        .chat-list-item .chat-info { flex: 1; min-width: 0; }
        .chat-list-item .chat-name { font-weight: 600; font-size: 0.9rem; }
        .chat-list-item .chat-preview { font-size: 0.78rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-list-item .chat-time { font-size: 0.7rem; color: #999; flex-shrink: 0; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fafbfc; }
        .chat-window .window-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--white); display: flex; align-items: center; gap: 12px; height: var(--header-height); }
        .chat-window .window-header .back-btn { display: none; background: none; border: none; font-size: 1.3rem; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message-bubble { max-width: 65%; padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; position: relative; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-bubble.sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .message-bubble.received { align-self: flex-start; background: #fff; border: 1px solid #e8e8e8; border-bottom-left-radius: 4px; }
        .message-bubble .msg-time { font-size: 0.65rem; margin-top: 4px; opacity: 0.7; text-align: right; }
        .message-bubble .encrypted-badge { font-size: 0.6rem; opacity: 0.6; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        .chat-input-area { padding: 12px 20px; background: var(--white); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 24px; font-size: 0.9rem; outline: none; background: #f5f6f8; }
        .chat-input-area input:focus { border-color: var(--primary); background: #fff; }
        .chat-input-area button { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: #fff; border: none; cursor: pointer; font-size: 1.2rem; }
        .chat-input-area button:hover { background: var(--primary-dark); }
        .moments-page { padding: 0; overflow-y: auto; background: #fafbfc; }
        .moments-header { background: var(--white); padding: 16px 20px; font-weight: 700; border-bottom: 1px solid var(--border); position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; height: var(--header-height); }
        .moment-post-box { background: var(--white); margin: 16px 20px; padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px; }
        .moment-post-box textarea { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 0.9rem; resize: none; font-family: inherit; outline: none; min-height: 80px; background: #fafbfc; }
        .moment-post-box .post-btn { padding: 8px 20px; background: var(--primary); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .moment-card { background: var(--white); margin: 10px 20px; padding: 16px; border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .moment-card .moment-author { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .moment-card .moment-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
        .moment-card .moment-author-name { font-weight: 600; }
        .moment-card .moment-time { font-size: 0.7rem; color: #999; }
        .moment-card .moment-content { font-size: 0.9rem; line-height: 1.6; margin-bottom: 10px; }
        .moment-card .moment-actions { display: flex; gap: 20px; font-size: 0.8rem; color: var(--text-secondary); }
        .moment-card .moment-actions span { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .moment-card .moment-actions span:hover { color: var(--primary); }
        .moment-card .moment-actions span.liked { color: #e74c3c; }
        .moment-comments { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; font-size: 0.8rem; }
        .moment-comment-input { display: flex; gap: 8px; margin-top: 6px; }
        .moment-comment-input input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 14px; font-size: 0.78rem; outline: none; }
        .moment-comment-input button { padding: 6px 12px; background: var(--primary); color: #fff; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .friends-page { padding: 0; overflow-y: auto; background: #fafbfc; }
        .friends-page .page-header { background: var(--white); padding: 16px 20px; font-weight: 700; border-bottom: 1px solid var(--border); position: sticky; top: 0; height: var(--header-height); display: flex; align-items: center; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--white); border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .search-box { margin: 12px 20px; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 0.85rem; outline: none; }
        .search-box button { padding: 10px 16px; background: var(--primary); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-accept { padding: 5px 12px; background: var(--success); color: #fff; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .btn-reject { padding: 5px 12px; background: #ddd; color: #666; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .btn-chat { padding: 5px 12px; background: var(--primary); color: #fff; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; margin-left: auto; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; gap: 12px; font-size: 0.9rem; }
        .auth-page { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .auth-card { background: var(--white); border-radius: var(--radius); padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .auth-card h2 { font-size: 1.6rem; margin-bottom: 6px; }
        .auth-card .subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
        .auth-card input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; margin-bottom: 12px; outline: none; }
        .auth-card .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .auth-card .switch-text { margin-top: 16px; font-size: 0.85rem; color: var(--text-secondary); }
        .auth-card .switch-text a { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border); height: var(--nav-mobile-height); z-index: 100; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom, 0); }
        .mobile-nav .nav-tab { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #999; font-size: 0.65rem; border: none; background: none; padding: 6px; }
        .mobile-nav .nav-tab.active { color: var(--primary); }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding-bottom: var(--nav-mobile-height); }
            .chat-list-panel { width: 100%; min-width: 100%; border-right: none; }
            .chat-window { position: fixed; top: 0; left: 0; right: 0; bottom: var(--nav-mobile-height); z-index: 50; display: none; background: #fafbfc; }
            .chat-window.mobile-open { display: flex; }
            .chat-window .window-header .back-btn { display: block; }
            .message-bubble { max-width: 80%; }
        }
        @media (min-width: 769px) {
            .mobile-nav { display: none; }
            .chat-window .window-header .back-btn { display: none; }
            .chat-window { display: flex !important; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="toast" id="toast"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">🔒 SecureChat</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="messages" onclick="switchPage('messages')">💬 消息</button>
                <button class="nav-item" data-page="moments" onclick="switchPage('moments')">🌐 好友圈</button>
                <button class="nav-item" data-page="friends" onclick="switchPage('friends')">👥 好友</button>
            </nav>
            <div class="sidebar-footer" id="sidebar-footer">
                <div class="avatar" id="sidebar-avatar">?</div>
                <div class="user-info">
                    <div class="user-name" id="sidebar-name">未登录</div>
                    <div class="user-status">在线</div>
                </div>
                <button class="logout-btn" onclick="handleLogout()">⏻</button>
            </div>
        </aside>
        <main class="main-content" id="main-content">
            <div class="page active" id="page-messages">
                <div class="chat-list-page">
                    <div class="chat-list-panel">
                        <div class="panel-header">💬 聊天列表</div>
                        <div class="chat-list" id="chat-list"></div>
                        <div class="empty-state" id="chat-empty">还没有聊天，去添加好友吧</div>
                    </div>
                    <div class="chat-window" id="chat-window">
                        <div class="window-header">
                            <button class="back-btn" onclick="closeMobileChat()">←</button>
                            <span id="chat-window-title">选择一个对话</span>
                        </div>
                        <div class="chat-messages" id="chat-messages"><div class="empty-state">👋 选择一个好友开始加密聊天</div></div>
                        <div class="chat-input-area" id="chat-input-area" style="display:none">
                            <input type="text" id="chat-input" placeholder="输入消息...(端到端加密)" onkeydown="if(event.key==='Enter')sendMessage()">
                            <button onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="page" id="page-moments">
                <div class="moments-page" style="height:100%;overflow-y:auto;">
                    <div class="moments-header">🌐 好友圈</div>
                    <div class="moment-post-box">
                        <textarea id="moment-input" placeholder="分享你的想法..."></textarea>
                        <button class="post-btn" onclick="postMoment()">发布</button>
                    </div>
                    <div id="moments-list"></div>
                </div>
            </div>
            <div class="page" id="page-friends">
                <div class="friends-page" style="height:100%;overflow-y:auto;">
                    <div class="page-header">👥 好友管理</div>
                    <div class="search-box">
                        <input type="text" id="search-user-input" placeholder="搜索用户...">
                        <button onclick="searchUser()">🔍 搜索</button>
                    </div>
                    <div id="search-results"></div>
                    <div style="padding:8px 20px;font-weight:600;">我的好友</div>
                    <div id="friends-list"></div>
                    <div style="padding:8px 20px;font-weight:600;color:#856404;">好友请求</div>
                    <div id="requests-list"></div>
                </div>
            </div>
        </main>
        <nav class="mobile-nav" id="mobile-nav">
            <button class="nav-tab active" data-page="messages" onclick="switchPage('messages')">💬消息</button>
            <button class="nav-tab" data-page="moments" onclick="switchPage('moments')">🌐好友圈</button>
            <button class="nav-tab" data-page="friends" onclick="switchPage('friends')">👥好友</button>
        </nav>
        <div class="auth-page" id="auth-page" style="display:none;">
            <div class="auth-card">
                <h2 id="auth-title">🔐 登录 SecureChat</h2>
                <p class="subtitle">端到端加密聊天，保护你的隐私</p>
                <input type="text" id="auth-username" placeholder="用户名">
                <input type="password" id="auth-password" placeholder="密码">
                <input type="password" id="auth-confirm-password" placeholder="确认密码" style="display:none;">
                <button class="btn-primary" id="auth-btn" onclick="handleAuth()">登 录</button>
                <p class="switch-text" id="switch-text">还没有账号？<a onclick="toggleAuthMode()">立即注册</a></p>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
        let currentUser = null, authToken = null, currentChatFriend = null, ws = null;
        let isLoginMode = true, isMobile = window.innerWidth <= 768;
        let friendsCache = [], chatListCache = [], momentsCache = [], userKeyPair = null;

        function $(id) { return document.getElementById(id); }
        function showToast(msg, d=2500) { const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),d); }
        function avatarColor(n) { const c=['#4f6ef7','#e74c3c','#2ecc71','#f39c12','#9b59b6']; let h=0; for(let i=0;i<(n||'?').length;i++)h=n.charCodeAt(i)+((h<<5)-h); return c[Math.abs(h)%c.length]; }
        function formatTime(ts){ const d=new Date(ts),n=new Date(),df=n-d; if(df<6e4)return'刚刚'; if(df<36e5)return Math.floor(df/6e4)+'分钟前'; if(df<864e5)return Math.floor(df/36e5)+'小时前'; return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'}); }

        const CryptoHelper = {
            async generateKeyPair(){ return await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']); },
            async exportPublicKey(k){ const jwk = await crypto.subtle.exportKey('jwk',k); return { kty: jwk.kty, crv: jwk.crv, x: jwk.x, y: jwk.y }; },
            async importPublicKey(jwk){ return await crypto.subtle.importKey('jwk', { kty: jwk.kty, crv: jwk.crv, x: jwk.x, y: jwk.y }, {name:'ECDH',namedCurve:'P-256'},true,[]); },
            async importPrivateKey(jwk){ return await crypto.subtle.importKey('jwk',jwk,{name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']); },
            async deriveSharedKey(privKey, pubJwk){ const rKey=await this.importPublicKey(pubJwk); return await crypto.subtle.deriveKey({name:'ECDH',public:rKey},privKey,{name:'AES-GCM',length:256},true,['encrypt','decrypt']); },
            async encrypt(plain, key){ const iv=crypto.getRandomValues(new Uint8Array(12)); const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plain)); const c=new Uint8Array(iv.length+new Uint8Array(enc).length); c.set(iv); c.set(new Uint8Array(enc),iv.length); return btoa(String.fromCharCode(...c)); },
            async decrypt(cipher, key){ try{ const d=Uint8Array.from(atob(cipher),c=>c.charCodeAt(0)); const iv=d.slice(0,12),ct=d.slice(12); const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct); return new TextDecoder().decode(dec); }catch(e){return'[解密失败]';} }
        };

        async function getOrGenerateKeyPair(userId) {
            const storageKey = `ecdh_private_jwk_${userId}`;
            const stored = localStorage.getItem(storageKey);
            if (stored) {
                try {
                    const privateJwk = JSON.parse(stored);
                    const privateKey = await CryptoHelper.importPrivateKey(privateJwk);
                    const pubJwk = await CryptoHelper.exportPublicKey(privateKey);
                    return { privateKey, publicKey: pubJwk };
                } catch(e) { /* 密钥损坏，重新生成 */ }
            }
            const kp = await CryptoHelper.generateKeyPair();
            const privateJwk = await crypto.subtle.exportKey('jwk', kp.privateKey);
            localStorage.setItem(storageKey, JSON.stringify(privateJwk));
            const pubJwk = await CryptoHelper.exportPublicKey(kp.publicKey);
            return { privateKey: kp.privateKey, publicKey: pubJwk };
        }

        async function apiFetch(path, opt={}){ const h={'Content-Type':'application/json'}; if(authToken)h['Authorization']='Bearer '+authToken; const r=await fetch(API_BASE+path,{...opt,headers:{...h,...opt.headers}}); const d=await r.json(); if(!r.ok)throw new Error(d.error||'请求失败'); return d; }
        function toggleAuthMode(){ isLoginMode=!isLoginMode; $('auth-title').textContent=isLoginMode?'登录':'注册'; $('auth-btn').textContent=isLoginMode?'登 录':'注 册'; $('auth-confirm-password').style.display=isLoginMode?'none':'block'; $('switch-text').innerHTML=isLoginMode?'还没有账号？<a onclick="toggleAuthMode()">立即注册</a>':'已有账号？<a onclick="toggleAuthMode()">去登录</a>'; }
        
        async function handleAuth(){
            const u=$('auth-username').value.trim(),p=$('auth-password').value,cp=$('auth-confirm-password').value;
            if(!u||!p)return showToast('请填写完整'); if(!isLoginMode&&p!==cp)return showToast('密码不一致'); if(p.length<4)return showToast('密码至少4位');
            try{
                if(isLoginMode){
                    const data = await apiFetch('/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
                    authToken = data.token;
                    currentUser = data.user;
                    const kp = await getOrGenerateKeyPair(currentUser.id);
                    userKeyPair = kp;
                    await apiFetch('/user/public-key',{method:'PUT',body:JSON.stringify({public_key:kp.publicKey})});
                } else {
                    // 注册时先生成密钥对，再传公钥
                    const tempId = 'temp_' + Date.now(); // 临时ID
                    const kp = await getOrGenerateKeyPair(tempId);
                    const data = await apiFetch('/register',{method:'POST',body:JSON.stringify({username:u,password:p,public_key:kp.publicKey})});
                    authToken = data.token;
                    currentUser = data.user;
                    // 将临时密钥迁移到正式用户ID
                    const tempStorageKey = `ecdh_private_jwk_${tempId}`;
                    const newStorageKey = `ecdh_private_jwk_${currentUser.id}`;
                    const stored = localStorage.getItem(tempStorageKey);
                    if (stored) {
                        localStorage.setItem(newStorageKey, stored);
                        localStorage.removeItem(tempStorageKey);
                    }
                    userKeyPair = kp;
                }
                localStorage.setItem('securechat_token',authToken);
                localStorage.setItem('securechat_user',JSON.stringify(currentUser));
                $('auth-page').style.display='none';
                updateUIForUser();
                connectWebSocket();
                switchPage('messages');
                loadAllData();
                showToast('成功！');
            }catch(e){ showToast(e.message); }
        }

        function handleLogout(){ 
            if(ws)ws.close(); 
            // 不清除密钥，保留在本地
            authToken=null; currentUser=null; userKeyPair=null; 
            localStorage.removeItem('securechat_token');
            localStorage.removeItem('securechat_user');
            $('auth-page').style.display='flex'; 
            updateUIForUser(); 
        }

        function connectWebSocket(){ if(!authToken)return; if(ws)ws.close(); ws=new WebSocket(WS_URL+'?token='+authToken); ws.onmessage=async(e)=>{ const m=JSON.parse(e.data); if(m.type==='new_message'&&currentUser&&userKeyPair){ const fid=m.message.from_id===currentUser.id?m.message.to_id:m.message.from_id; if(currentChatFriend&&currentChatFriend.id===fid){ const sk=await getSharedKeyWithFriend(fid); const dc=await CryptoHelper.decrypt(m.message.content,sk); appendMessageBubble({...m.message,decrypted_content:dc},m.message.from_id===currentUser.id?'sent':'received'); scrollChatBottom(); } loadChatList(); } if(m.type==='new_moment')loadMoments(); }; ws.onclose=()=>setTimeout(()=>{if(authToken)connectWebSocket();},5000); }
        function sendWS(d){ if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(d)); }
        function updateUIForUser(){ if(currentUser){ $('sidebar-avatar').textContent=currentUser.username[0].toUpperCase(); $('sidebar-name').textContent=currentUser.username; $('sidebar').style.display=isMobile?'none':'flex'; $('mobile-nav').style.display=isMobile?'flex':'none'; $('auth-page').style.display='none'; } else { $('sidebar').style.display='none'; $('mobile-nav').style.display='none'; $('auth-page').style.display='flex'; } }
        function switchPage(p){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); const t=$('page-'+p); if(t)t.classList.add('active'); document.querySelectorAll('.sidebar-nav .nav-item,.mobile-nav .nav-tab').forEach(n=>n.classList.remove('active')); const sn=document.querySelector(`.sidebar-nav .nav-item[data-page="${p}"]`), mn=document.querySelector(`.mobile-nav .nav-tab[data-page="${p}"]`); if(sn)sn.classList.add('active'); if(mn)mn.classList.add('active'); if(p==='messages')loadChatList(); if(p==='moments')loadMoments(); if(p==='friends')loadFriendsData(); if(isMobile&&p!=='messages')$('chat-window').classList.remove('mobile-open'); }
        
        async function getSharedKeyWithFriend(fid){ 
            const data = await apiFetch(`/user/${fid}/public-key`);
            // 确保传入的公钥只有必要字段
            const cleanPub = { kty: data.public_key.kty, crv: data.public_key.crv, x: data.public_key.x, y: data.public_key.y };
            return await CryptoHelper.deriveSharedKey(userKeyPair.privateKey, cleanPub);
        }

        async function loadChatList(){ if(!currentUser)return; try{ const d=await apiFetch('/chat-list'); chatListCache=d.chats||[]; renderChatList(); }catch(e){} }
        function renderChatList(){ const c=$('chat-list'),e=$('chat-empty'); if(chatListCache.length===0){ c.innerHTML=''; e.style.display='flex'; return; } e.style.display='none'; c.innerHTML=chatListCache.map(ch=>`<div class="chat-list-item ${currentChatFriend&&currentChatFriend.id===ch.friend_id?'active':''}" onclick="openChat(${ch.friend_id},'${ch.friend_name}')"><div class="chat-avatar" style="background:${avatarColor(ch.friend_name)}">${ch.friend_name[0].toUpperCase()}</div><div class="chat-info"><div class="chat-name">${ch.friend_name}</div><div class="chat-preview">🔒 加密消息</div></div><div class="chat-time">${formatTime(ch.last_time)}</div></div>`).join(''); }
        async function openChat(fid,fn){ currentChatFriend={id:fid,username:fn}; $('chat-window-title').textContent='🔒 '+fn; $('chat-input-area').style.display='flex'; if(isMobile)$('chat-window').classList.add('mobile-open'); renderChatList(); await loadMessages(fid); scrollChatBottom(); }
        function closeMobileChat(){ $('chat-window').classList.remove('mobile-open'); currentChatFriend=null; $('chat-input-area').style.display='none'; renderChatList(); }
        async function loadMessages(fid){ if(!currentUser||!userKeyPair)return; try{ const d=await apiFetch('/messages/'+fid); const ms=d.messages||[]; const c=$('chat-messages'); if(ms.length===0){ c.innerHTML='<div class="empty-state">开始加密聊天</div>'; return; } const sk=await getSharedKeyWithFriend(fid); c.innerHTML=''; for(const m of ms){ const dc=await CryptoHelper.decrypt(m.content,sk); appendMessageBubble({...m,decrypted_content:dc},m.from_id===currentUser.id?'sent':'received'); } scrollChatBottom(); }catch(e){}
        }
        function appendMessageBubble(m,t){ const c=$('chat-messages'); if(c.querySelector('.empty-state'))c.innerHTML=''; const b=document.createElement('div'); b.className='message-bubble '+t; b.innerHTML=`${m.decrypted_content||m.content}<div class="msg-time">${formatTime(m.created_at)}</div><div class="encrypted-badge">🔒 已加密</div>`; c.appendChild(b); }
        function scrollChatBottom(){ setTimeout(()=>{const c=$('chat-messages');c.scrollTop=c.scrollHeight;},100); }
        async function sendMessage(){ if(!currentUser||!currentChatFriend||!userKeyPair)return; const i=$('chat-input'),pt=i.value.trim(); if(!pt)return; i.value=''; const sk=await getSharedKeyWithFriend(currentChatFriend.id); const enc=await CryptoHelper.encrypt(pt,sk); try{ const d=await apiFetch('/messages',{method:'POST',body:JSON.stringify({to_id:currentChatFriend.id,content:enc})}); d.message.decrypted_content=pt; appendMessageBubble(d.message,'sent'); scrollChatBottom(); sendWS({type:'new_message',message:d.message}); loadChatList(); }catch(e){showToast(e.message);} }
        async function loadMoments(){ if(!currentUser)return; try{ const d=await apiFetch('/moments'); momentsCache=d.moments||[]; renderMoments(); }catch(e){} }
        function renderMoments(){ const c=$('moments-list'); if(momentsCache.length===0){ c.innerHTML='<div style="text-align:center;padding:40px;">暂无动态</div>'; return; } c.innerHTML=momentsCache.map(m=>{ const liked=m.likes&&m.likes.includes(currentUser.id); return `<div class="moment-card"><div class="moment-author"><div class="moment-avatar" style="background:${avatarColor(m.username)}">${m.username[0].toUpperCase()}</div><div><div class="moment-author-name">${m.username}</div><div class="moment-time">${formatTime(m.created_at)}</div></div></div><div class="moment-content">${m.content.replace(/</g,'&lt;')}</div><div class="moment-actions"><span class="${liked?'liked':''}" onclick="toggleLike(${m.id},this)">${liked?'❤️':'🤍'} ${m.like_count||0}</span><span>💬 ${m.comments.length}</span></div><div class="moment-comments">${m.comments.map(c=>`<div><strong>${c.username}:</strong> ${c.content.replace(/</g,'&lt;')}</div>`).join('')}</div><div class="moment-comment-input"><input id="comment-input-${m.id}" placeholder="评论..."><button onclick="addComment(${m.id})">发送</button></div></div>`; }).join(''); }
        async function postMoment(){ const c=$('moment-input').value.trim(); if(!c)return showToast('请输入内容'); try{ await apiFetch('/moments',{method:'POST',body:JSON.stringify({content:c})}); $('moment-input').value=''; sendWS({type:'new_moment'}); loadMoments(); }catch(e){showToast(e.message);} }
        async function toggleLike(mid,el){ try{ const d=await apiFetch('/moments/'+mid+'/like',{method:'POST'}); el.classList.toggle('liked',d.liked); el.innerHTML=(d.liked?'❤️':'🤍')+' '+d.like_count; }catch(e){} }
        async function addComment(mid){ const i=$('comment-input-'+mid),c=i.value.trim(); if(!c)return; try{ await apiFetch('/moments/'+mid+'/comment',{method:'POST',body:JSON.stringify({content:c})}); i.value=''; loadMoments(); }catch(e){showToast(e.message);} }
        async function loadFriendsData(){ if(!currentUser)return; try{ const d=await apiFetch('/friends'); friendsCache=d.friends||[]; renderFriendsList(); renderRequestsList(d.requests||[]); }catch(e){} }
        function renderFriendsList(){ const c=$('friends-list'); if(friendsCache.length===0){ c.innerHTML='<div style="padding:20px;text-align:center;">暂无好友</div>'; return; } c.innerHTML=friendsCache.map(f=>`<div class="friend-item"><div class="chat-avatar" style="background:${avatarColor(f.username)};width:40px;height:40px;">${f.username[0].toUpperCase()}</div><div><div style="font-weight:600;">${f.username}</div></div><button class="btn-chat" onclick="openChat(${f.id},'${f.username}');switchPage('messages')">💬</button></div>`).join(''); }
        function renderRequestsList(reqs){ const c=$('requests-list'); if(!reqs||reqs.length===0){ c.innerHTML='<div style="padding:16px 20px;">无待处理请求</div>'; return; } c.innerHTML=reqs.map(r=>`<div class="friend-item"><div class="chat-avatar" style="background:${avatarColor(r.username)};width:40px;height:40px;">${r.username[0].toUpperCase()}</div><div><div style="font-weight:600;">${r.username}</div></div><div class="request-actions"><button class="btn-accept" onclick="handleFriendRequest(${r.from_id},'accept')">接受</button><button class="btn-reject" onclick="handleFriendRequest(${r.from_id},'reject')">拒绝</button></div></div>`).join(''); }
        async function searchUser(){ const q=$('search-user-input').value.trim(); if(!q)return showToast('输入搜索内容'); try{ const d=await apiFetch('/search-users?q='+encodeURIComponent(q)); const c=$('search-results'); if(d.users.length===0)c.innerHTML='<div style="padding:16px;">未找到</div>'; else c.innerHTML=d.users.map(u=>`<div class="friend-item"><div class="chat-avatar" style="background:${avatarColor(u.username)};width:40px;height:40px;">${u.username[0].toUpperCase()}</div><div><div style="font-weight:600;">${u.username}</div></div><button class="btn-accept" onclick="sendFriendRequest(${u.id})">➕</button></div>`).join(''); }catch(e){showToast('搜索失败');} }
        async function sendFriendRequest(tid){ try{ await apiFetch('/friend-request',{method:'POST',body:JSON.stringify({to_id:tid})}); showToast('请求已发送'); $('search-results').innerHTML=''; }catch(e){showToast(e.message);} }
        async function handleFriendRequest(fid,act){ try{ await apiFetch('/friend-request/'+fid,{method:'POST',body:JSON.stringify({action:act})}); showToast(act==='accept'?'已接受':'已拒绝'); loadFriendsData(); loadChatList(); }catch(e){showToast(e.message);} }
        async function loadAllData(){ await Promise.all([loadChatList(),loadFriendsData(),loadMoments()]); }

        // 初始化
        window.onload = async function(){
            const savedToken = localStorage.getItem('securechat_token');
            const savedUser = localStorage.getItem('securechat_user');
            if (savedToken && savedUser) {
                authToken = savedToken;
                try { currentUser = JSON.parse(savedUser); } catch(e) {}
                if (currentUser) {
                    const kp = await getOrGenerateKeyPair(currentUser.id);
                    userKeyPair = kp;
                    updateUIForUser();
                    connectWebSocket();
                    switchPage('messages');
                    loadAllData();
                    return;
                }
            }
            // 未登录
            $('auth-page').style.display = 'flex';
            updateUIForUser();
            window.addEventListener('resize', ()=>{
                const was = isMobile;
                isMobile = window.innerWidth <= 768;
                if (was !== isMobile) updateUIForUser();
            });
            setInterval(()=>{ if(currentUser) loadChatList(); }, 10000);
        };
    </script>
</body>
</html>
